name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Make gradlew executable
      run: chmod +x android/gradlew
    
    - name: Create keystore file
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/android/app/release.jks
    
    - name: Build Release APK
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        ./gradlew assembleDebug \
          -DTMDB_API_KEY="$TMDB_API_KEY" \
          -DKEYSTORE_FILE="$KEYSTORE_FILE" \
          -DKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
          -DKEY_ALIAS="$KEY_ALIAS" \
          -DKEY_PASSWORD="$KEY_PASSWORD"
    
    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "APK found at: $APK_PATH"
    
    - name: Create Release Package
      run: |
        mkdir -p release-package
        cp ${{ steps.find_apk.outputs.apk_path }} release-package/MovieApp-debug.apk
        
        # Create README with installation instructions
        cat > release-package/INSTALL.md << 'EOF'
        # Movie Explorer - Android APK
        
        ## Installation on Termux
        
        1. Download the APK file: `MovieApp-debug.apk`
        
        2. Transfer to Android device:
           ```bash
           # On PC
           adb push MovieApp-debug.apk /sdcard/Download/
           ```
        
        3. Install via Termux:
           ```bash
           # In Termux
           pkg install android-tools
           adb install /sdcard/Download/MovieApp-debug.apk
           ```
        
        4. Or install directly on device:
           - Open file manager
           - Navigate to Downloads folder
           - Tap MovieApp-debug.apk
           - Follow installation prompts
        
        ## Configuration
        
        - Minimum Android: 8.0 (API 26)
        - Target Android: 14 (API 34)
        - Size: ~45-50 MB
        
        ## First Run
        
        1. Grant required permissions:
           - Internet access
        
        2. App will fetch movies/TV shows from TMDB API
        
        3. Content is cached locally for offline browsing
        
        ## Features
        
        - Browse Popular, Top Rated, and Upcoming Movies
        - Browse Popular, Top Rated, and On The Air TV Shows
        - Search movies and TV shows
        - Filter by genres and networks
        - PIN protect content
        - Offline caching
        
        ## Troubleshooting
        
        - If API returns no data, check internet connection
        - Clear app cache: Settings → Apps → Movie Explorer → Storage → Clear Cache
        - Reinstall app if issues persist
        EOF
        
        # Create build info
        cat > release-package/BUILD_INFO.txt << EOF
        Build Information
        =================
        Build Date: $(date)
        Git Commit: ${GITHUB_SHA:0:7}
        Git Branch: ${GITHUB_REF#refs/heads/}
        Workflow Run: ${{ github.run_number }}
        
        File: MovieApp-debug.apk
        Size: $(du -h release-package/MovieApp-debug.apk | cut -f1)
        MD5: $(md5sum release-package/MovieApp-debug.apk | awk '{print $1}')
        SHA256: $(sha256sum release-package/MovieApp-debug.apk | awk '{print $1}')
        EOF
    
    - name: Create ZIP Package
      run: |
        cd release-package
        zip -r MovieApp-${{ github.run_number }}.zip MovieApp-debug.apk INSTALL.md BUILD_INFO.txt
        ls -lh MovieApp-*.zip
    
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MovieApp-APK-${{ github.run_number }}
        path: release-package/
        retention-days: 30
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.0-build-${{ github.run_number }}
        release_name: Movie Explorer APK Build ${{ github.run_number }}
        body: |
          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}
          
          ## Installation Instructions
          
          1. Download `MovieApp-debug.apk` or the ZIP package
          2. Follow instructions in INSTALL.md
          3. Install on Android device
          
          ### Via ADB (Recommended for Termux):
          ```bash
          adb install -r MovieApp-debug.apk
          ```
          
          ### Via File Manager:
          - Download the APK
          - Open with default installer
          - Grant permissions and install
          
          ## Release Notes
          ${{ github.event.inputs.release_notes || 'Automated build release' }}
        draft: false
        prerelease: false
    
    - name: Upload to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-package/MovieApp-${{ github.run_number }}.zip
        asset_name: MovieApp-v1.0.0-build-${{ github.run_number }}.zip
        asset_content_type: application/zip
    
    - name: Upload APK to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: release-package/MovieApp-debug.apk
        asset_name: MovieApp-release-${{ github.run_number }}.apk
        asset_content_type: application/vnd.android.package-archive
    
    - name: Clean up keystore
      if: always()
      run: rm -f ${{ github.workspace }}/android/app/release.jks
